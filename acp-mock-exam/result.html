<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考试成绩 - 阿里云大模型ACP模拟</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="result-hero">
      <h1>模拟考试成绩</h1>
      <div class="score-circle" id="scoreCircle">0</div>
      <p class="score-total" id="scoreTotal">/ 100 分</p>
      <p class="pass-msg hidden" id="passMsg">恭喜，已达到及格线！</p>
      <p class="fail-msg hidden" id="failMsg">未达及格线，建议复习后再次模拟。</p>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="value" id="statScore">0</div>
        <div class="label">得分</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statCorrect">0</div>
        <div class="label">正确题数</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statTotal">0</div>
        <div class="label">总题数</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statTime">0:00</div>
        <div class="label">用时</div>
      </div>
    </div>

    <section class="review-section" id="reviewSection">
      <div class="review-header">
        <h2>题目回顾</h2>
        <div class="filter-tabs">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="wrong">错题 (<span id="wrongCount">0</span>)</button>
          <button class="filter-btn" data-filter="correct">正确 (<span id="correctCount">0</span>)</button>
        </div>
      </div>
      <div id="reviewList"></div>
    </section>

    <div class="actions" style="margin-top:24px;">
      <a href="index.html" class="btn btn-secondary">再考一次</a>
      <a href="exam.html" class="btn btn-primary">重新抽题并考试</a>
    </div>
  </div>

  <script>
    (function() {
      const raw = sessionStorage.getItem('acpExamResults');
      if (!raw) {
        window.location.href = 'index.html';
        return;
      }
      const data = JSON.parse(raw);
      const { results, score, total, correct, timeUsed } = data;

      const pass = score >= 80;
      document.getElementById('scoreCircle').textContent = score;
      document.getElementById('scoreTotal').textContent = '/ 100 分';
      document.getElementById('scoreCircle').className = 'score-circle ' + (pass ? 'pass' : 'fail');
      document.getElementById(pass ? 'passMsg' : 'failMsg').classList.remove('hidden');
      document.getElementById('statScore').textContent = score + ' / 100';
      document.getElementById('statCorrect').textContent = correct;
      document.getElementById('statTotal').textContent = total;
      const m = Math.floor(timeUsed / 60);
      const s = timeUsed % 60;
      document.getElementById('statTime').textContent = m + ':' + (s < 10 ? '0' : '') + s;

      const wrong = results.filter(function(r) { return !r.correct; });
      const right = results.filter(function(r) { return r.correct; });
      
      document.getElementById('wrongCount').textContent = wrong.length;
      document.getElementById('correctCount').textContent = right.length;

      const reviewList = document.getElementById('reviewList');

      function renderReview(filter) {
        reviewList.innerHTML = '';
        let filtered = results;
        if (filter === 'wrong') filtered = wrong;
        else if (filter === 'correct') filtered = right;

        if (filtered.length === 0) {
          if (filter === 'wrong') {
            reviewList.innerHTML = '<p style="color:var(--text-muted);">全部正确，无需错题回顾。</p>';
          } else if (filter === 'correct') {
            reviewList.innerHTML = '<p style="color:var(--text-muted);">暂无正确题目。</p>';
          }
          return;
        }

        filtered.forEach(function(r, i) {
          const div = document.createElement('div');
          div.className = 'review-item' + (r.correct ? ' correct' : ' wrong');
          let optionsHtml = '';
          if (r.options && r.options.length) {
            optionsHtml = '<div class="review-options"><strong>选项：</strong><ul>';
            r.options.forEach(function(opt) { optionsHtml += '<li>' + opt + '</li>'; });
            optionsHtml += '</ul></div>';
          }
          const statusLabel = r.correct ? '<span class="status-tag correct">✓ 正确</span>' : '<span class="status-tag wrong">✗ 错误</span>';
          div.innerHTML =
            '<div class="q-num">' + statusLabel + ' 第 ' + (results.indexOf(r) + 1) + ' 题 · ' + r.category + (r.maxPoints === 2 ? ' · 多选' : '') + '</div>' +
            '<div class="q-text">' + r.question + '</div>' +
            optionsHtml +
            '<div class="your-answer ' + (r.correct ? 'correct' : 'wrong') + '">你的答案：' + (r.displayUser || '未作答') + '</div>' +
            '<div class="correct-answer">正确答案：' + r.displayAnswer + '</div>' +
            (r.explanation ? '<div class="explanation"><strong>答案解析：</strong>' + r.explanation + '</div>' : '');
          reviewList.appendChild(div);
        });
      }

      // 默认显示全部
      renderReview('all');

      // 筛选按钮事件
      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          renderReview(this.dataset.filter);
        });
      });
    })();
  </script>
</body>
</html>
